version: "3.9"

services:
  db:
    image: postgres:16
    container_name: camerakontrol-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: camerakontrol
      POSTGRES_PASSWORD: camerakontrol
      POSTGRES_DB: camerakontrol
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    container_name: camerakontrol-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://camerakontrol:camerakontrol@db:5432/camerakontrol
      - PORT=4000
      - RECORDINGS_PATH=/app/recordings
    depends_on:
      - db
    ports:
      - "4000:4000"
    volumes:
      - recordings_data:/app/recordings

  frontend:
    build: ./frontend
    container_name: camerakontrol-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:
  recordings_data:

